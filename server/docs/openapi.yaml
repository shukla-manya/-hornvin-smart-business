openapi: 3.0.3
info:
  title: Vello Trade API
  description: |
    REST API for the Vello Trade B2B marketplace mobile app (Expo). JSON routes are mounted under **`/api`** (the mobile client uses `baseURL: {host}/api`).

    **Socket.IO** runs on the same HTTP server. After login, connect with JWT in handshake `auth: { token: "<jwt>" }`.
    Events include `room:join`, `chat:typing`, `message:new`, `chat:room:updated`. See the repository README for details.

    **Schemas:** reusable request/response models are under **Schemas** at the bottom of this page. Operations use `$ref` to those models where applicable.
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Health
  - name: Documentation
  - name: Auth
  - name: Products
  - name: Orders
  - name: Chat
  - name: Invoices
  - name: Dealers
  - name: Users
  - name: Payments
  - name: Locations
  - name: Dealer locator
  - name: Notifications
  - name: Wishlist
  - name: Admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    ErrorCode:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    ValidationErrors:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            additionalProperties: true

    HealthOk:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true

    OpenApiRoot:
      type: object
      additionalProperties: true
      description: Full OpenAPI 3 document (info, paths, components, etc.)

    RoleEntry:
      type: object
      properties:
        id:
          type: string
        label:
          type: string

    AuthRolesResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleEntry"
        registerableRoles:
          type: array
          items:
            $ref: "#/components/schemas/RoleEntry"
        policy:
          type: object
          properties:
            registerAllowedRolesEnvSet:
              type: boolean
            distributorSelfRegisterAllowed:
              type: boolean

    RegisterRequest:
      type: object
      required: [password, role]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [company, distributor, retail, end_user]
        name:
          type: string
        businessName:
          type: string
        address:
          type: string
        companyId:
          type: string
        distributorId:
          type: string

    LoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        otpCode:
          type: string

    EmailOnlyBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    EmailOtpBody:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
        code:
          type: string

    RegisterVerifyEmailBody:
      type: object
      required: [email, otpCode]
      properties:
        email:
          type: string
        otpCode:
          type: string

    ForgotResetBody:
      type: object
      required: [email, code, newPassword]
      properties:
        email:
          type: string
        code:
          type: string
        newPassword:
          type: string
          minLength: 6

    ChangePasswordBody:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    ProfilePatchBody:
      type: object
      properties:
        name:
          type: string

    GeoLatLng:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
        lng:
          type: number

    UserPublic:
      type: object
      description: User without secrets (API safe shape)
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [company, distributor, retail, end_user]
        name:
          type: string
        businessName:
          type: string
        address:
          type: string
        location:
          type: object
          nullable: true
          properties:
            type:
              type: string
              enum: [Point]
            coordinates:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
        companyId: {}
        distributorId: {}
        isPlatformOwner:
          type: boolean
        status:
          type: string
        lifecycleStatus:
          type: string
        permissions:
          type: object
          properties:
            canAddProducts:
              type: boolean
            canPlaceOrders:
              type: boolean
            canSell:
              type: boolean
        mustChangePassword:
          type: boolean
        emailVerified:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    TokenResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserPublic"

    ProductCreateRequest:
      type: object
      required: [name, category, price, quantity]
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        quantity:
          type: integer
        description:
          type: string
        images:
          type: array
          items:
            type: string

    ProductPatchRequest:
      type: object
      description: Partial update (all fields optional)
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        quantity:
          type: integer
        description:
          type: string
        images:
          type: array
          items:
            type: string

    ProductDocument:
      type: object
      description: Product document (fields may vary; refs may be populated)
      additionalProperties: true
      properties:
        _id:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: number
        quantity:
          type: number
        description:
          type: string
        images:
          type: array
          items:
            type: string
        isGlobalCatalog:
          type: boolean
        companyId: {}
        sellerId: {}

    OrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1

    OrderCreateRequest:
      type: object
      required: [sellerId, items]
      properties:
        sellerId:
          type: string
        orderChannel:
          type: string
          enum: [marketplace, stock]
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderDocument:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        buyerId: {}
        sellerId: {}
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        status:
          type: string
        total:
          type: number
        notes:
          type: string

    OrderStatusBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, shipped, completed, cancelled]

    ChatOpenRoomRequest:
      type: object
      required: [withUserId]
      properties:
        withUserId:
          type: string

    ChatMessageBody:
      type: object
      properties:
        body:
          type: string
        productId:
          type: string
        orderId:
          type: string

    InvoiceFromOrderBody:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string

    InvoiceDocument:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        issuerId: {}
        customerId: {}
        orderId: {}
        number:
          type: string
        status:
          type: string
          enum: [draft, sent, paid, overdue]
        subtotal:
          type: number
        tax:
          type: number
        total:
          type: number
        lines:
          type: array
          items:
            type: object
            additionalProperties: true

    InvoiceStatusBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [draft, sent, paid, overdue]
        method:
          type: string
          enum: [cash, upi, bank, card, unknown]
        notes:
          type: string

    RetailCreateRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        name:
          type: string
        businessName:
          type: string

    LinkDistributorBody:
      type: object
      required: [companyId]
      properties:
        companyId:
          type: string

    LinkRetailBody:
      type: object
      required: [distributorId]
      properties:
        distributorId:
          type: string

    PaymentCreateRequest:
      type: object
      required: [payeeId, amount]
      properties:
        payeeId:
          type: string
        amount:
          type: number
        method:
          type: string
        currency:
          type: string
        orderId:
          type: string
        invoiceId:
          type: string
        notes:
          type: string

    PaymentDocument:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        payerId: {}
        payeeId: {}
        amount:
          type: number
        currency:
          type: string
        method:
          type: string
        status:
          type: string
        orderId: {}
        invoiceId: {}

    PaymentStatusBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, completed, failed, refunded]

    LocationCreateRequest:
      type: object
      required: [label, lat, lng]
      properties:
        label:
          type: string
        lat:
          type: number
        lng:
          type: number
        address:
          type: string
        roleContext:
          type: string
        isPrimary:
          type: boolean

    LocationPatchRequest:
      type: object
      description: Partial update; if both lat and lng are sent, geo is replaced
      properties:
        label:
          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
        roleContext:
          type: string

    LocationDocument:
      type: object
      additionalProperties: true

    DeviceTokenBody:
      type: object
      required: [token]
      properties:
        token:
          type: string
        platform:
          type: string
          enum: [ios, android, expo, web, unknown]

    DeviceTokenRemoveBody:
      type: object
      required: [token]
      properties:
        token:
          type: string

    WishlistAddRequest:
      type: object
      required: [productId]
      properties:
        productId:
          type: string

    AdminCreateDistributorBody:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 6
        name:
          type: string
        businessName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    AdminCreateRetailBody:
      type: object
      required: [password, companyId, distributorId]
      properties:
        password:
          type: string
          minLength: 6
        companyId:
          type: string
        distributorId:
          type: string
        email:
          type: string
        phone:
          type: string
        name:
          type: string
        businessName:
          type: string

    AdminPatchUserBody:
      type: object
      properties:
        status:
          type: string
        permissions:
          type: object
          properties:
            canAddProducts:
              type: boolean
            canPlaceOrders:
              type: boolean
            canSell:
              type: boolean
        name:
          type: string
        businessName:
          type: string
        address:
          type: string

    AdminCatalogProductBody:
      type: object
      required: [name, category, price, quantity]
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        quantity:
          type: integer
        description:
          type: string
        images:
          type: array
          items:
            type: string

    AdminCategoryCreateBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
        sortOrder:
          type: integer

    AdminCategoryPatchBody:
      type: object
      properties:
        name:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean

    PaginatedUsers:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserPublic"
        total:
          type: integer
        limit:
          type: integer
        skip:
          type: integer

    PaginatedOrders:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderDocument"
        total:
          type: integer
        limit:
          type: integer
        skip:
          type: integer

    PaginatedPayments:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: "#/components/schemas/PaymentDocument"
        total:
          type: integer
        limit:
          type: integer
        skip:
          type: integer

    ProductsListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductDocument"

    CategoryDocument:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        name:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean

    CategoriesListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryDocument"

    AnalyticsSummary:
      type: object
      additionalProperties: true
      properties:
        totalRevenue:
          type: number
        orderCountByStatus:
          type: object
          additionalProperties:
            type: integer
        userCountByStatus:
          type: object
          additionalProperties:
            type: integer
        productCount:
          type: integer
        activeUsers:
          type: integer

    JsonArray:
      type: array
      items:
        type: object
        additionalProperties: true

    JsonObject:
      type: object
      additionalProperties: true

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"

  /openapi.json:
    get:
      tags: [Documentation]
      summary: Raw OpenAPI 3 document (same as served to Swagger UI)
      security: []
      responses:
        "200":
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenApiRoot"

  /api/auth/roles:
    get:
      tags: [Auth]
      summary: Roles and self-registration policy from environment
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRolesResponse"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TokenResponse"
                  - type: object
                    properties:
                      needsEmailVerification:
                        type: boolean
                      user:
                        $ref: "#/components/schemas/UserPublic"
                      message:
                        type: string
                  - type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserPublic"
                      pendingApproval:
                        type: boolean

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login (email or phone + password; email may require OTP follow-up)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token or OTP challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TokenResponse"
                  - type: object
                    additionalProperties: true

  /api/auth/login-otp/request:
    post:
      tags: [Auth]
      summary: Request passwordless login OTP email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailOnlyBody"

  /api/auth/login-otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and receive JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailOtpBody"

  /api/auth/register/verify-email:
    post:
      tags: [Auth]
      summary: Verify end_user email after registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterVerifyEmailBody"

  /api/auth/register/resend-email-code:
    post:
      tags: [Auth]
      summary: Resend registration verification code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailOnlyBody"

  /api/auth/forgot/request:
    post:
      tags: [Auth]
      summary: Request password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailOnlyBody"

  /api/auth/forgot/reset:
    post:
      tags: [Auth]
      summary: Reset password with code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotResetBody"

  /api/auth/password:
    patch:
      tags: [Auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"

  /api/auth/profile:
    get:
      tags: [Auth]
      summary: Current user (alias)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"
    patch:
      tags: [Auth]
      summary: Update display name only
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilePatchBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"

  /api/auth/me/location:
    patch:
      tags: [Auth]
      summary: Set GeoJSON point on user for maps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeoLatLng"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"

  /api/products:
    get:
      tags: [Products]
      summary: List products (global catalog + listings; optional filters)
      security: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: companyId
          schema:
            type: string
        - in: query
          name: sellerId
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsListResponse"
    post:
      tags: [Products]
      summary: Create listing (company / distributor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: "#/components/schemas/ProductDocument"

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Product detail
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: "#/components/schemas/ProductDocument"
    patch:
      tags: [Products]
      summary: Update own product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductPatchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: "#/components/schemas/ProductDocument"
    delete:
      tags: [Products]
      summary: Delete own product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/orders:
    get:
      tags: [Orders]
      summary: Orders where I am buyer or seller
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderDocument"
    post:
      tags: [Orders]
      summary: Place order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: "#/components/schemas/OrderDocument"

  /api/orders/history:
    get:
      tags: [Orders]
      summary: Same as GET /api/orders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderDocument"

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Order by id (participant only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: "#/components/schemas/OrderDocument"

  /api/orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update status (buyer/seller rules)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: "#/components/schemas/OrderDocument"

  /api/chat/rooms:
    get:
      tags: [Chat]
      summary: My rooms
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: "#/components/schemas/JsonObject"
    post:
      tags: [Chat]
      summary: Open or create 1:1 room
      requestBody:
