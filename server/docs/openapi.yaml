            enum: [company, distributor, retail, end_user]
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected, suspended, blocked]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: skip
          schema:
