openapi: 3.0.3
info:
  title: Vello Trade API
  description: |
    REST API for the Vello Trade B2B marketplace mobile app (Expo). JSON routes are mounted under **`/api`** (the mobile client uses `baseURL: {host}/api`).

    **Socket.IO** runs on the same HTTP server. After login, connect with JWT in handshake `auth: { token: "<jwt>" }`.
    Events include `room:join`, `chat:typing`, `message:new`, `chat:room:updated`. See the repository README for details.

    **Schemas:** expand the **Schemas** section at the bottom of this page for reusable request/response models (`UserPublic`, `Product`, `Order`, etc.). Individual operations still show inline request bodies where noted.
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: Products
  - name: Orders
  - name: Chat
  - name: Invoices
  - name: Dealers
  - name: Users
  - name: Payments
  - name: Locations
  - name: Dealer locator
  - name: Notifications
  - name: Wishlist
  - name: Admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          description: Machine-readable error code when present

    ValidationErrors:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            additionalProperties: true

    ObjectId:
      type: string
      pattern: "^[a-fA-F0-9]{24}$"
      description: MongoDB ObjectId as 24 hex characters

    GeoJsonPoint:
      type: object
      description: GeoJSON Point on a user (2dsphere index)
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          description: "[lng, lat] (GeoJSON order)"

    UserPermissions:
      type: object
      properties:
        canAddProducts:
          type: boolean
        canPlaceOrders:
          type: boolean
        canSell:
          type: boolean

    UserPublic:
      type: object
      description: Safe user fields returned by the API (no password hash)
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        id:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string
          enum: [company, distributor, retail, end_user]
        name:
          type: string
        businessName:
          type: string
        address:
          type: string
        location:
          $ref: "#/components/schemas/GeoJsonPoint"
        companyId:
          $ref: "#/components/schemas/ObjectId"
        distributorId:
          $ref: "#/components/schemas/ObjectId"
        isPlatformOwner:
          type: boolean
        status:
          type: string
          enum: [pending, approved, rejected, suspended, blocked]
        lifecycleStatus:
          type: string
          description: Derived UX label (e.g. active vs pending)
        permissions:
          $ref: "#/components/schemas/UserPermissions"
        mustChangePassword:
          type: boolean
        emailVerified:
          type: boolean
        createdBy:
          $ref: "#/components/schemas/ObjectId"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: true

    RoleDescriptor:
      type: object
      properties:
        id:
          type: string
        label:
          type: string

    AuthRolesResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleDescriptor"
        registerableRoles:
          type: array
          items:
            $ref: "#/components/schemas/RoleDescriptor"
        policy:
          type: object
          properties:
            registerAllowedRolesEnvSet:
              type: boolean
            distributorSelfRegisterAllowed:
              type: boolean
            companyRootExists:
              type: boolean
              description: True when a Hornvin `company` (platform root) account already exists
            hornvinRootSignupOpen:
              type: boolean
              description: True when self-serve Hornvin company signup is offered (no root yet + BOOTSTRAP_PLATFORM_OWNER_EMAIL set)

    RegisterRequest:
      type: object
      required: [password, role]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [company, distributor, retail, end_user]
        name:
          type: string
        businessName:
          type: string
        address:
          type: string
        companyId:
          $ref: "#/components/schemas/ObjectId"
        distributorId:
          $ref: "#/components/schemas/ObjectId"

    LoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        otpCode:
          type: string

    AuthTokenResponse:
      type: object
      description: Successful login — JWT and user profile
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserPublic"

    LoginOtpChallenge:
      type: object
      description: Email login may require a second mail OTP step
      properties:
        pendingOtp:
          type: boolean
        email:
          type: string

    Product:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        companyId:
          oneOf:
            - $ref: "#/components/schemas/ObjectId"
            - $ref: "#/components/schemas/UserPublic"
        sellerId:
          oneOf:
            - $ref: "#/components/schemas/ObjectId"
            - $ref: "#/components/schemas/UserPublic"
        name:
          type: string
        description:
          type: string
        category:
          type: string
        price:
          type: number
        quantity:
          type: number
        images:
          type: array
          items:
            type: string
        isGlobalCatalog:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: true

    ProductCreateRequest:
      type: object
      required: [name, category, price, quantity]
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        quantity:
          type: integer
        description:
          type: string
        images:
          type: array
          items:
            type: string

    OrderItem:
      type: object
      required: [productId, quantity, unitPrice]
      properties:
        productId:
          $ref: "#/components/schemas/ObjectId"
        quantity:
          type: number
        unitPrice:
          type: number
        title:
          type: string

    Order:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        buyerId:
          oneOf:
            - $ref: "#/components/schemas/ObjectId"
            - $ref: "#/components/schemas/UserPublic"
        sellerId:
          oneOf:
            - $ref: "#/components/schemas/ObjectId"
            - $ref: "#/components/schemas/UserPublic"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        status:
          type: string
          enum: [pending, confirmed, shipped, completed, cancelled]
        total:
          type: number
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: true

    OrderCreateRequest:
      type: object
      required: [sellerId, items]
      properties:
        sellerId:
          $ref: "#/components/schemas/ObjectId"
        orderChannel:
          type: string
          enum: [marketplace, stock]
        notes:
          type: string
        items:
          type: array
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId:
                $ref: "#/components/schemas/ObjectId"
              quantity:
                type: integer

    ChatRoom:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ObjectId"
        lastMessageAt:
          type: string
          format: date-time
      additionalProperties: true

    ChatMessage:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        roomId:
          $ref: "#/components/schemas/ObjectId"
        senderId:
          $ref: "#/components/schemas/ObjectId"
        body:
          type: string
        productId:
          $ref: "#/components/schemas/ObjectId"
        orderId:
          $ref: "#/components/schemas/ObjectId"
        createdAt:
          type: string
          format: date-time
      additionalProperties: true

    Invoice:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        orderId:
          $ref: "#/components/schemas/ObjectId"
        issuerId:
          $ref: "#/components/schemas/ObjectId"
        customerId:
          $ref: "#/components/schemas/ObjectId"
        status:
          type: string
          enum: [draft, sent, paid, overdue]
        total:
          type: number
      additionalProperties: true

    Payment:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        payerId:
          $ref: "#/components/schemas/ObjectId"
        payeeId:
          $ref: "#/components/schemas/ObjectId"
        amount:
          type: number
        currency:
          type: string
        method:
          type: string
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        orderId:
          $ref: "#/components/schemas/ObjectId"
        invoiceId:
          $ref: "#/components/schemas/ObjectId"
        notes:
          type: string
      additionalProperties: true

    SavedLocation:
      type: object
      description: Saved map pin / dealer locator location
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        userId:
          $ref: "#/components/schemas/ObjectId"
        label:
          type: string
        lat:
          type: number
        lng:
          type: number
        address:
          type: string
        roleContext:
          type: string
        isPrimary:
          type: boolean
      additionalProperties: true

    AppNotification:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        userId:
          $ref: "#/components/schemas/ObjectId"
        type:
          type: string
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      additionalProperties: true

    WishlistItem:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        userId:
          $ref: "#/components/schemas/ObjectId"
        productId:
          oneOf:
            - $ref: "#/components/schemas/ObjectId"
            - $ref: "#/components/schemas/Product"
      additionalProperties: true

    Category:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        name:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean
      additionalProperties: true

    PaginatedUsers:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserPublic"
        total:
          type: integer
        limit:
          type: integer
        skip:
          type: integer

    PaginatedOrders:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        limit:
          type: integer
        skip:
          type: integer

    PaginatedPayments:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        total:
          type: integer
        limit:
          type: integer
        skip:
          type: integer

    AnalyticsSummary:
      type: object
      properties:
        totalRevenue:
          type: number
        orderCountByStatus:
          type: object
          additionalProperties:
            type: integer
        userCountByStatus:
          type: object
          additionalProperties:
            type: integer
        activeUsers:
          type: integer
        productCount:
          type: integer

    WorkspaceSummary:
      type: object
      description: Distributor workspace dashboard counts (shape varies by implementation)
      additionalProperties: true

    HealthOk:
      type: object
      properties:
        ok:
          type: boolean
          example: true

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"

  /api/auth/roles:
    get:
      tags: [Auth]
      summary: Roles and self-registration policy from environment
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRolesResponse"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/UserPublic"
        "400":
          description: Validation or policy error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationErrors"
        "403":
          description: Role policy (e.g. Hornvin company root already exists or bootstrap email mismatch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login (email or phone + password; email may require OTP follow-up)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token or OTP challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthTokenResponse"
                  - $ref: "#/components/schemas/LoginOtpChallenge"

  /api/auth/login-otp/request:
    post:
      tags: [Auth]
      summary: Request passwordless login OTP email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email

  /api/auth/login-otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and receive JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                code:
                  type: string

  /api/auth/register/verify-email:
    post:
      tags: [Auth]
      summary: Verify end_user email after registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otpCode]
              properties:
                email:
                  type: string
                otpCode:
                  type: string

  /api/auth/register/resend-email-code:
    post:
      tags: [Auth]
      summary: Resend registration verification code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string

  /api/auth/forgot/request:
    post:
      tags: [Auth]
      summary: Request password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string

  /api/auth/forgot/reset:
    post:
      tags: [Auth]
      summary: Reset password with code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, newPassword]
              properties:
                email:
                  type: string
                code:
                  type: string
                newPassword:
                  type: string
                  minLength: 6

  /api/auth/password:
    patch:
      tags: [Auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"

  /api/auth/profile:
    get:
      tags: [Auth]
      summary: Current user (alias)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"
    patch:
      tags: [Auth]
      summary: Update display name only
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"

  /api/auth/me/location:
    patch:
      tags: [Auth]
      summary: Set GeoJSON point on user for maps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat:
                  type: number
                lng:
                  type: number

  /api/products:
    get:
      tags: [Products]
      summary: List products (global catalog + listings; optional filters)
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: companyId
          schema:
            type: string
        - in: query
          name: sellerId
          schema:
            type: string
    post:
      tags: [Products]
      summary: Create listing (company / distributor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: "#/components/schemas/Product"

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Product detail
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: "#/components/schemas/Product"
    patch:
      tags: [Products]
      summary: Update own product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    delete:
      tags: [Products]
      summary: Delete own product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

  /api/orders:
    get:
      tags: [Orders]
      summary: Orders where I am buyer or seller
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
    post:
      tags: [Orders]
      summary: Place order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: "#/components/schemas/Order"

  /api/orders/history:
    get:
      tags: [Orders]
      summary: Same as GET /api/orders

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Order by id (participant only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: "#/components/schemas/Order"

  /api/orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update status (buyer/seller rules)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, confirmed, shipped, completed, cancelled]

  /api/chat/rooms:
    get:
      tags: [Chat]
      summary: My rooms
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatRoom"
    post:
      tags: [Chat]
      summary: Open or create 1:1 room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [withUserId]
              properties:
                withUserId:
                  type: string

  /api/chat/rooms/open:
    post:
      tags: [Chat]
      summary: Alias of POST /api/chat/rooms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [withUserId]
              properties:
                withUserId:
                  type: string

  /api/chat/rooms/{roomId}/messages:
    get:
      tags: [Chat]
      summary: Messages in room
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatMessage"
    post:
      tags: [Chat]
      summary: Send message
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                productId:
                  type: string
                orderId:
                  type: string

  /api/invoices:
    get:
      tags: [Invoices]
      summary: My invoices (issuer or customer)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invoice"

  /api/invoices/from-order:
    post:
      tags: [Invoices]
      summary: Generate invoice from order (seller)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId:
                  type: string

  /api/invoices/{id}/status:
    patch:
      tags: [Invoices]
      summary: Update invoice / mark paid
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, sent, paid, overdue]
                method:
                  type: string
                  enum: [cash, upi, bank, card, unknown]
                notes:
                  type: string

  /api/dealers/nearby:
    get:
